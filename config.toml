[settings]
output_dir = "output"
delay_between_requests = 8.0
output_format = "comma"    # "comma" = AAPL,MSFT  |  "newline" = 一行一个
min_dollar_volume = 100_000_000  # Longs 过滤: price * avg volume >= 100M

# --- Longs: 5 个策略合并去重，输出为 Longs.txt ---

[[longs]]
name = "Relative Volume Surge"
filters = ["sh_avgvol_o500","sh_price_o20","ta_beta_o1.5","ta_perf_dup","ta_sma200_pa"]
min_relative_volume = 3
relative_volume_days = 20

[[longs]]
name = "Top Gainers"
signal = "ta_topgainers"
filters = ["sh_avgvol_o500","sh_price_o20","ta_beta_o1.5","ta_sma200_pa"]

[[longs]]
name = "Gap Up"
filters = ["sh_avgvol_o500","sh_price_o20","ta_beta_o1.5","ta_gap_u3","ta_sma200_pa"]

[[longs]]
name = "52W New High"
filters = ["cap_smallover","sh_avgvol_o1000","sh_price_o20","ta_beta_o1.5","ta_highlow52w_nh","ta_sma200_pa","ta_sma50_pa"]

# --- Shorts: 基于 Kristjan Kullamägi 博客的做空筛选，单独输出为 Shorts.txt ---

[shorts]
name = "Short Candidates"
filters = ["ta_sma20_pa20", "sh_avgvol_o1000", "cap_smallover"]
min_dollar_volume = 100_000_000
min_consecutive_up_days = 3
# Performance thresholds by cap size (month perf %)
perf_large_cap = 50     # >= $10B: month perf >= 50%
perf_mid_cap = 200      # $2B–$10B: month perf >= 200%
perf_small_cap = 300    # $300M–$2B: month perf >= 300%

# --- RS: 条件触发，仅当 SPY 和 QQQ 都跌超 1% 时运行 ---

[rs]
name = "Relative Strength"
filters = ["sh_avgvol_o500","sh_price_o20","ta_beta_o1.5","ta_perf_dup","ta_sma200_pa","ta_sma50_pa"]

# --- HK Shorts: 基于 HKEX 数据的港股做空筛选，输出为 HongKongShorts/HK_Shorts.txt ---

[hk_shorts]
name = "HK Short Candidates"
min_avg_volume = 1_000_000             # 日均成交量 (股)
min_market_cap = 300_000_000           # 最低市值 (HKD, 3亿)
min_dollar_volume = 100_000_000        # 最低成交额 (HKD)
min_consecutive_up_days = 3
# 按市值分级的月涨幅阈值 (%)
perf_large_cap = 50                    # >= 100亿 HKD
perf_mid_cap = 200                     # 20亿-100亿 HKD
perf_small_cap = 300                   # 3亿-20亿 HKD
# 市值分界线 (HKD)
large_cap_threshold = 10_000_000_000
mid_cap_threshold = 2_000_000_000

# --- Morning Gap: 盘中扫描 (开盘后 10/15/20/25/30 分钟运行) ---

[morning_gap]
name = "Morning Gap Up"
filters = ["sh_avgvol_o500","sh_price_o10","ta_beta_o1.5","ta_gap_u5","ta_sma200_pa"]
avg_volume_days = 20
min_dollar_volume = 100_000_000
scan_offsets = [10, 15, 20, 25, 30]
archive_offset = 30
offset_tolerance_minutes = 2
