[settings]
output_dir = "output"
delay_between_requests = 8.0
output_format = "comma"    # "comma" = AAPL,MSFT  |  "newline" = 一行一个
min_dollar_volume = 100_000_000  # Longs 过滤: price * avg volume >= 100M
# ADR% (Average Daily Range) 全局门槛 — 应用到 Longs / Leaders / RS / Shorts /
# HK Shorts / Morning Gap。ADR% = mean((High - Low) / Close) over last
# `adr_days` completed daily bars * 100。过滤"无波动"的票，捕捉 catalyst-
# driven volatility。设 0 即可关闭。原 Finviz beta>1.5 过滤已废弃 (beta 反映
# 多年市场相关性，与"现在是不是 in-play"正交)，由 ADR% 替代。
min_adr_percent = 3.5
adr_days = 20

# --- Futu (富途牛牛) 自动同步 ---
# 需要本地运行 FutuOpenD,且分组需在富途客户端预先手动建好(API 不能新建分组)
[futu]
enabled = true
host = "127.0.0.1"
port = 11111
# Groups in this list are append-only: scanners only ADD tickers, never DEL.
# Used for merged/shared groups so multiple scanners can feed one group
# without clobbering each other. The group accumulates indefinitely —
# clear it manually in the Futu client when it gets too crowded.
append_only_groups = ["EarningsGap"]

[futu.groups]
# EarningsGap is the merged "gap watch" group: EOD earnings-gap scan +
# pre-market morning-gap + post-open morning-gap all sync into it (append-only).
longs_earnings_gap = "EarningsGap"
morning_gap = "EarningsGap"
morning_gap_pre = "EarningsGap"
longs_high_volume = "HighVolume"
longs_gap_up = "GapUp"
longs_new_high_52w = "NewHigh52W"
longs_top_gainers = "TopGainers"
shorts = "Shorts"
rs = "RS"
hk_shorts = "HKShorts"
leaders = "Leaders"

# --- Longs: 5 个子策略，按 list 顺序内部互斥去重，每个单独输出。
# 优先级 (高 → 低): EarningsGap > HighVolume > GapUp > NewHigh52W > TopGainers
# 并集仍参与 Longs > Leaders > RS 的跨组去重。

[[longs]]
key = "earnings_gap"
name = "Earnings Gap"
filters = ["ind_stocksonly","cap_smallover","earningsdate_today","sh_avgvol_o500","sh_price_o20","sh_relvol_o1.5","ta_gap_u5","ta_sma200_pa"]

[[longs]]
key = "high_volume"
name = "Relative Volume Surge"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_dup","ta_sma200_pa"]
min_relative_volume = 3
relative_volume_days = 20

[[longs]]
key = "gap_up"
name = "Gap Up"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_gap_u3","ta_sma200_pa"]

[[longs]]
key = "new_high_52w"
name = "52W New High"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_highlow52w_nh","ta_sma200_pa","ta_sma50_pa"]

[[longs]]
key = "top_gainers"
name = "Top Gainers"
signal = "ta_topgainers"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_sma200_pa"]

# --- Leaders: 强势 + 站上均线，5 个 perf 窗口合并去重，输出为 Leaders.txt ---
# 共同条件: cap >= small, avg vol > 500K, price > $20,
#           价格在 SMA50 / SMA200 之上;
# 全局 min_dollar_volume ($100M, 20-day avg) 和 min_adr_percent (>= 3.5%, 20d)
# 也会自动套用。

[[leaders]]
name = "Leaders 4W +30%"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_4w30o","ta_sma200_pa","ta_sma50_pa"]

[[leaders]]
name = "Leaders 13W +50%"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_13w50o","ta_sma200_pa","ta_sma50_pa"]

[[leaders]]
name = "Leaders 26W +100%"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_26w100o","ta_sma200_pa","ta_sma50_pa"]

[[leaders]]
name = "Leaders YTD +100%"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_ytd100o","ta_sma200_pa","ta_sma50_pa"]

[[leaders]]
name = "Leaders 52W +150%"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_52w150o","ta_sma200_pa","ta_sma50_pa"]

# --- Shorts: 基于 Kristjan Kullamägi 博客的做空筛选，单独输出为 Shorts.txt ---

[shorts]
name = "Short Candidates"
filters = ["ind_stocksonly", "ta_sma20_pa20", "sh_avgvol_o1000", "cap_smallover"]
min_dollar_volume = 100_000_000
min_consecutive_up_days = 3
# Performance thresholds by cap size (month perf %)
perf_large_cap = 50     # >= $10B: month perf >= 50%
perf_mid_cap = 200      # $2B–$10B: month perf >= 200%
perf_small_cap = 300    # $300M–$2B: month perf >= 300%

# --- RS: 条件触发，仅当 SPY 和 QQQ 都跌超 1% 时运行 ---

[rs]
name = "Relative Strength"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o20","ta_perf_dup","ta_sma200_pa","ta_sma50_pa"]

# --- HK Shorts: 基于 HKEX 数据的港股做空筛选，输出为 HongKongShorts/HK_Shorts.txt ---

[hk_shorts]
name = "HK Short Candidates"
min_avg_volume = 1_000_000             # 日均成交量 (股)
min_market_cap = 300_000_000           # 最低市值 (HKD, 3亿)
min_dollar_volume = 100_000_000        # 最低成交额 (HKD)
min_consecutive_up_days = 3
# 按市值分级的月涨幅阈值 (%)
perf_large_cap = 50                    # >= 100亿 HKD
perf_mid_cap = 200                     # 20亿-100亿 HKD
perf_small_cap = 300                   # 3亿-20亿 HKD
# 市值分界线 (HKD)
large_cap_threshold = 10_000_000_000
mid_cap_threshold = 2_000_000_000

# --- Morning Gap: 盘前 -20/-10 + 盘后 +10/+15/+20/+25/+30 分钟扫描 ---
# 负数 offset = 盘前扫描 (输出到 MorningGapPre.txt, 跳过盘中累计成交量过滤);
# 正数 offset = 盘后扫描 (输出到 MorningGap.txt, 累计量须 >= 20日均量)。
# 两者共享 Finviz 过滤和 20日美元成交量 >= $100M 的门槛。

[morning_gap]
name = "Morning Gap Up"
filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o10","ta_gap_u5","ta_sma200_pa"]
# Pre-market candidate discovery. Finviz's `ta_gap_u5` is computed off today's
# regular-session open vs prior close — before 9:30 ET that's stale (yesterday's
# gap winners). `ta_topgainers` reflects today's percentage change including
# pre-market activity. We drop `ta_gap_u5` here and let `_filter_pre_market_gap`
# (yfinance pre-market price vs prev close >= min_pre_market_gap_percent)
# enforce the actual gap threshold downstream. Used only when offset < 0;
# post-open scans keep `filters`/`signal` above.
pre_market_filters = ["ind_stocksonly","cap_smallover","sh_avgvol_o500","sh_price_o10","ta_sma200_pa"]
pre_market_signal = "ta_topgainers"
avg_volume_days = 20
min_dollar_volume = 100_000_000
scan_offsets = [-20, -10, 10, 15, 20, 25, 30]
offset_tolerance_minutes = 2
# Pre-market gap threshold (yfinance pre-market last vs prev close). With
# pre_market_signal=ta_topgainers the candidate set already reflects today's
# movement, so this filters down from "any gainer" to "true gap-ups". Set
# to 0 to disable.
min_pre_market_gap_percent = 5.0
# ADR% filter is inherited from [settings] (min_adr_percent / adr_days).
# Override here if a different threshold is desired for morning-gap only.

# --- 推送通知 (ntfy.sh) ---
# Morning-gap 扫描发现"新"票时推送到 phone + Mac 浏览器。
# 同一交易日内已出现过的票不会重复推送(state 文件: output/state/morning_gap_seen_<date>.txt)。
# Topic 名后缀是随机串 = 私人频道,谁知道 topic 名谁就能订阅。
[notify]
enabled = true
ntfy_topic = "xue-finviz-morning-gap-9f3k2"
ntfy_server = "https://ntfy.sh"
max_tickers_in_body = 10
